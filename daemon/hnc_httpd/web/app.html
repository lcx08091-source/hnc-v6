<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F5F5F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<title>HNC 远程访问</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="hdr">
  <div class="hdr-title">
    <span class="logo">HNC</span>
    <span class="subtitle">远程访问</span>
  </div>
  <div class="hdr-right">
    <span class="badge" id="status-badge">连接中...</span>
    <span class="badge session-badge" id="session-badge" style="display:none"></span>
    <button class="logout-btn" id="logout-btn" onclick="doLogout()" style="display:none" title="登出并撤销本设备的授权">登出</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab on" data-tab="devices" onclick="switchTab('devices')">设备</button>
  <button class="tab" data-tab="stats" onclick="switchTab('stats')">统计</button>
  <button class="tab" data-tab="self" onclick="switchTab('self')">我的应用</button>
  <button class="tab" data-tab="export" onclick="switchTab('export')">导出</button>
</nav>

<main>

<section id="tab-devices" class="tab-content">
  <div class="section-head">
    <h2>连接的设备</h2>
    <span class="meta" id="devices-meta">--</span>
  </div>
  <div class="device-filter-row">
    <span class="device-filter-note" id="device-filter-note">默认隐藏离线历史设备</span>
    <select id="device-filter-mode" class="device-filter-select" aria-label="设备过滤">
      <option value="online_only">只看在线</option>
      <option value="all">显示全部</option>
      <option value="offline_rules">只看离线规则</option>
    </select>
  </div>
  <div id="devices-list" class="list">
    <div class="loading">加载中...</div>
  </div>
</section>

<section id="tab-stats" class="tab-content" style="display:none">
  <div class="section-head">
    <h2>流量统计</h2>
  </div>
  <div class="filters">
    <div class="seg" id="stats-range">
      <button data-range="today" class="on" onclick="setRange('today')">今日</button>
      <button data-range="week" onclick="setRange('week')">本周</button>
      <button data-range="month" onclick="setRange('month')">本月</button>
      <button data-range="all" onclick="setRange('all')">总计</button>
    </div>
    <select id="stats-dev" onchange="renderStatsChart()">
      <option value="">全部设备</option>
    </select>
  </div>
  <div class="totals">
    <div><span class="lbl">下行</span><span class="rx-v" id="total-rx">--</span></div>
    <div><span class="lbl">上行</span><span class="tx-v" id="total-tx">--</span></div>
  </div>
  <svg id="chart-svg" class="chart" viewBox="0 0 400 180" preserveAspectRatio="none"></svg>
  <div class="legend">
    <span><i class="dot rx"></i>下行 (RX)</span>
    <span><i class="dot tx"></i>上行 (TX)</span>
  </div>
</section>

<section id="tab-self" class="tab-content" style="display:none">
  <div class="section-head">
    <h2>我的应用</h2>
    <span class="meta" id="self-meta">--</span>
  </div>
  <div class="self-toggle-row">
    <label class="self-toggle">
      <input type="checkbox" id="self-toggle-input" onchange="toggleSelf(this.checked)">
      <span>开启自身流量追踪</span>
    </label>
    <span class="self-toggle-hint">关闭状态下不会读取 /proc/net,不会调用 pm list packages</span>
  </div>
  <div id="self-ifaces-row" class="meta" style="margin-bottom:.6em">--</div>
  <div id="self-apps-list" class="list">
    <div class="loading">未开启 / 加载中...</div>
  </div>
</section>

<section id="tab-export" class="tab-content" style="display:none">
  <div class="section-head">
    <h2>导出给 Claude 分析</h2>
  </div>
  <div class="quick" style="margin-bottom:.6em">
    <button onclick="setExportRange(15)">最近 15 分钟</button>
    <button onclick="setExportRange(60)">最近 1 小时</button>
    <button onclick="setExportRange(180)">最近 3 小时</button>
    <button onclick="setExportRange(360)">最近 6 小时</button>
  </div>
  <div class="form-row">
    <label for="export-from">起始</label>
    <input id="export-from" type="datetime-local" step="60">
  </div>
  <div class="form-row">
    <label for="export-to">结束</label>
    <input id="export-to" type="datetime-local" step="60">
  </div>
  <div class="form-row">
    <label for="export-notes">备注</label>
    <textarea id="export-notes" placeholder="给 Claude 的上下文(可空)"></textarea>
  </div>
  <button class="primary" onclick="buildExport()">打包 export zip</button>
  <div id="export-result"></div>
  <h3 style="margin-top:1em">最近的导出</h3>
  <div id="exports-list" class="list">
    <div class="loading">加载中...</div>
  </div>
</section>

</main>

<footer class="ft">
  <span id="version-info">hnc_httpd</span>
  <span class="sep">·</span>
  <span id="auth-mode">只读</span>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
