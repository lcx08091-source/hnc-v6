<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HNC 配对 · Remote Access Pairing</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica,
               "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  min-height: 100vh;
  display: flex; align-items:center; justify-content:center;
  color: #e2e8f0;
  padding: 20px;
}
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 36px 28px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  backdrop-filter: blur(16px);
}
h1 {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 8px;
  background: linear-gradient(90deg, #38bdf8, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.sub {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 24px;
  line-height: 1.55;
}
label {
  display: block;
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 8px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
input[type="text"] {
  width: 100%;
  padding: 14px 16px;
  font-size: 24px;
  text-align: center;
  letter-spacing: 8px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  color: #f1f5f9;
  font-family: "SF Mono", Menlo, Consolas, monospace;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="text"]:focus {
  border-color: #38bdf8;
  box-shadow: 0 0 0 3px rgba(56,189,248,0.2);
}
button {
  width: 100%;
  margin-top: 18px;
  padding: 13px;
  font-size: 15px;
  font-weight: 600;
  color: #0f172a;
  background: linear-gradient(90deg, #38bdf8, #818cf8);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
button:hover { opacity: 0.9; }
button:active { transform: scale(0.98); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.msg {
  margin-top: 16px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.5;
  display: none;
}
.msg.show { display: block; }
.msg.error {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  color: #fca5a5;
}
.msg.info {
  background: rgba(56,189,248,0.1);
  border: 1px solid rgba(56,189,248,0.3);
  color: #7dd3fc;
}
.footer {
  margin-top: 24px;
  font-size: 11px;
  color: #64748b;
  text-align: center;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 HNC 远程访问配对</h1>
  <p class="sub">
    在手机本机 WebUI 点击 <b style="color:#cbd5e1">"生成配对码"</b>,<br>
    然后把屏幕上显示的 6 位数字输入下方(120 秒有效)
  </p>

  <form id="pair-form">
    <label for="pin">配对码 PIN</label>
    <input
      id="pin"
      name="pin"
      type="text"
      inputmode="numeric"
      pattern="[0-9]{6}"
      maxlength="6"
      autocomplete="off"
      placeholder="······"
      required
      autofocus
    >
    <button type="submit" id="submit-btn">验证并登入</button>
  </form>

  <div class="msg" id="msg"></div>

  <p class="footer">
    此页面仅用于首次配对。配对成功后浏览器会自动跳转到 Dashboard。<br>
    如果 PIN 过期请回本机重新生成。
  </p>
</div>

<script>
(function(){
  var form = document.getElementById('pair-form');
  var pinInput = document.getElementById('pin');
  var btn = document.getElementById('submit-btn');
  var msg = document.getElementById('msg');

  // 只允许数字
  pinInput.addEventListener('input', function(e){
    e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0,6);
  });

  function showMsg(kind, text) {
    msg.className = 'msg show ' + kind;
    msg.textContent = text;
  }

  /* v4.0 Patch 2.d: ?prefill=XXXXXX 自动填充 PIN + 自动提交
   * 主人本机点"复制快捷链接"→ 通过消息 app 发给远端 → 远端点开就自动登录
   * 格式校验: 必须 6 位数字,其它视为手输模式不自动填 */
  function getPrefillPin(){
    try {
      var m = window.location.search.match(/[?&]prefill=([0-9]{6})(?:&|$)/);
      return m ? m[1] : null;
    } catch(e){ return null; }
  }
  var prefillPin = getPrefillPin();
  if(prefillPin){
    pinInput.value = prefillPin;
    // 清 URL 里的 prefill (防止返回/刷新/分享时 PIN 暴露)
    try {
      var cleanUrl = window.location.pathname + window.location.hash;
      history.replaceState(null, '', cleanUrl);
    } catch(e){}
    // 自动提交(给用户 0.5 秒看一眼"正在自动登录")
    showMsg('info', '检测到配对链接,正在自动登录…');
    setTimeout(function(){
      // 触发 submit 走下面的 submit handler
      if(form.requestSubmit) form.requestSubmit();
      else form.dispatchEvent(new Event('submit', {cancelable:true, bubbles:true}));
    }, 500);
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    var pin = pinInput.value.trim();
    if (pin.length !== 6) {
      showMsg('error', '请输入 6 位数字 PIN');
      return;
    }

    btn.disabled = true;
    btn.textContent = '验证中…';
    msg.className = 'msg';

    try {
      var body = new URLSearchParams();
      body.append('pin', pin);
      var resp = await fetch('/api/pair/verify', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: body.toString(),
        redirect: 'manual'
      });

      // 302: 配对成功
      if (resp.type === 'opaqueredirect' || (resp.status >= 300 && resp.status < 400)) {
        showMsg('info', '✓ 配对成功,正在跳转…');
        setTimeout(function(){ window.location.href = '/'; }, 400);
        return;
      }

      // 错误响应
      var data = {};
      try { data = await resp.json(); } catch(_) {}
      var errMsg = data.error || '未知错误 (HTTP ' + resp.status + ')';

      if (resp.status === 429) {
        var sec = data.locked_for_sec || parseInt(resp.headers.get('Retry-After')) || 600;
        var mins = Math.ceil(sec / 60);
        showMsg('error', '⛔ 尝试次数过多,请 ' + mins + ' 分钟后重试');
      } else if (resp.status === 410 || errMsg.indexOf('expired') >= 0) {
        showMsg('error', '⏱ 配对码已过期,请回本机重新生成');
      } else if (errMsg.indexOf('no active') >= 0) {
        showMsg('error', '当前没有活动配对请求,请先在本机点"生成配对码"');
      } else if (errMsg.indexOf('wrong pin') >= 0) {
        // v4.0 Patch 2.d: 显示剩余次数
        var rem = data.attempts_remaining;
        if (typeof rem === 'number' && rem >= 0) {
          if (rem === 0) {
            showMsg('error', 'PIN 错误,已达到尝试上限');
          } else if (rem === 1) {
            showMsg('error', '⚠ PIN 错误,<b>最后 1 次机会</b>,再错就锁 10 分钟');
          } else {
            showMsg('error', 'PIN 错误,还有 ' + rem + ' 次机会');
          }
        } else {
          showMsg('error', 'PIN 错误,请检查后重试');
        }
      } else if (errMsg.indexOf('bad pin format') >= 0) {
        showMsg('error', 'PIN 格式错误(应为 6 位数字)');
      } else {
        showMsg('error', errMsg);
      }
    } catch(err) {
      showMsg('error', '网络错误: ' + (err.message || err));
    } finally {
      btn.disabled = false;
      btn.textContent = '验证并登入';
      pinInput.focus();
      pinInput.select();
    }
  });
})();
</script>
</body>
</html>
