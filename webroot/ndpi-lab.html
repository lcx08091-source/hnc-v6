<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HNC nDPI Lab</title>
<style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:#0b1220;color:#e5eefc;margin:0;padding:18px}.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:16px;margin:12px 0}button{border:0;border-radius:12px;padding:10px 14px;background:#3b82f6;color:white;font-weight:700;margin:4px}pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.25);padding:12px;border-radius:12px;max-height:70vh;overflow:auto}.muted{color:#9ca3af}</style>
<body><h2>HNC nDPI Lab</h2><div class="card">可选实验引擎。nDPI 只做短时采样，不替代默认 Go DPI，不会修改 tc、iptables、DNS 或 offload。</div><div class="card"><button onclick="probe()">探测 nDPI 引擎</button><button onclick="sample()">采样 10 秒</button><button onclick="status()">读取状态</button><button onclick="readSample()">读取采样结果</button><p class="muted">采样时请让连接热点的设备打开网页或 App。</p><pre id="out">等待操作…</pre></div><script>
function exec(cmd){return new Promise((res,rej)=>{if(!window.ksu||!window.ksu.exec){rej(new Error('no ksu.exec'));return;}const cb='cb_'+Date.now()+'_'+Math.random().toString(16).slice(2);window[cb]=r=>{delete window[cb];res(String(r||''));};window.ksu.exec(cmd,cb);});}
async function probe(){const o=document.getElementById('out');o.textContent='running…';try{o.textContent=await exec('su -c "sh /data/local/hnc/bin/ndpi_lab_probe.sh; cat /data/local/hnc/run/ndpi_lab_state.json"');}catch(e){o.textContent=String(e);}}
async function sample(){const o=document.getElementById('out');o.textContent='sampling 10s…';try{o.textContent=await exec('su -c "sh /data/local/hnc/bin/ndpi_lab_sample.sh 10"');}catch(e){o.textContent=String(e);}}
async function status(){const o=document.getElementById('out');try{o.textContent=await exec('su -c "sh /data/local/hnc/bin/ndpi_lab_status.sh"');}catch(e){o.textContent=String(e);}}
async function readSample(){const o=document.getElementById('out');try{o.textContent=await exec('su -c "cat /data/local/hnc/run/ndpi_lab_sample.txt 2>/dev/null || echo no sample; echo; echo --- sample_state ---; cat /data/local/hnc/run/ndpi_lab_sample_state.json 2>/dev/null; echo; echo --- sample_structured ---; cat /data/local/hnc/run/ndpi_lab_sample_structured.json 2>/dev/null"');}catch(e){o.textContent=String(e);}}
</script></body></html>
