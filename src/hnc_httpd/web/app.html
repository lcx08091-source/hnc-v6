<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F5F5F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<title>HNC 远程访问</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="hdr">
  <div class="hdr-title">
    <span class="logo">HNC</span>
    <span class="subtitle">远程访问</span>
  </div>
  <div class="hdr-right">
    <span class="badge" id="status-badge">连接中...</span>
    <span class="badge session-badge" id="session-badge" style="display:none"></span>
    <button class="logout-btn" id="logout-btn" onclick="doLogout()" style="display:none" title="登出并撤销本设备的授权">登出</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab on" data-tab="devices" onclick="switchTab('devices')">设备</button>
  <button class="tab" data-tab="stats" onclick="switchTab('stats')">统计</button>
</nav>

<main>

<section id="tab-devices" class="tab-content">
  <div class="section-head">
    <h2>连接的设备</h2>
    <span class="meta" id="devices-meta">--</span>
  </div>
  <div class="device-filter-row">
    <span class="device-filter-note" id="device-filter-note">默认隐藏离线历史设备</span>
    <select id="device-filter-mode" class="device-filter-select" aria-label="设备过滤">
      <option value="online_only">只看在线</option>
      <option value="all">显示全部</option>
      <option value="offline_rules">只看离线规则</option>
    </select>
  </div>
  <div id="devices-list" class="list">
    <div class="loading">加载中...</div>
  </div>
</section>

<section id="tab-stats" class="tab-content" style="display:none">
  <div class="section-head">
    <h2>流量统计</h2>
  </div>
  <div class="filters">
    <div class="seg" id="stats-range">
      <button data-range="today" class="on" onclick="setRange('today')">今日</button>
      <button data-range="week" onclick="setRange('week')">本周</button>
      <button data-range="month" onclick="setRange('month')">本月</button>
      <button data-range="all" onclick="setRange('all')">总计</button>
    </div>
    <select id="stats-dev" onchange="renderStatsChart()">
      <option value="">全部设备</option>
    </select>
  </div>
  <div class="totals">
    <div><span class="lbl">下行</span><span class="rx-v" id="total-rx">--</span></div>
    <div><span class="lbl">上行</span><span class="tx-v" id="total-tx">--</span></div>
  </div>
  <svg id="chart-svg" class="chart" viewBox="0 0 400 180" preserveAspectRatio="none"></svg>
  <div class="legend">
    <span><i class="dot rx"></i>下行 (RX)</span>
    <span><i class="dot tx"></i>上行 (TX)</span>
  </div>
</section>

</main>

<footer class="ft">
  <span id="version-info">hnc_httpd</span>
  <span class="sep">·</span>
  <span id="auth-mode">只读</span>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
